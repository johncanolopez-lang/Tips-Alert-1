<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 12s linear infinite; }
        .unificado { font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .text-stroke { -webkit-text-stroke: 0.5px black; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body class="bg-white min-h-screen font-sans overflow-x-hidden">

    <canvas id="canvas" class="hidden"></canvas>
    <div id="modal" class="modal" onclick="this.style.display='none'"><img id="modal-img" class="rounded-3xl max-w-full"><p id="modal-desc" class="text-white mt-4 font-bold text-center uppercase text-sm"></p></div>

    <div class="w-full bg-white py-4 flex justify-center border-b sticky top-0 z-40 shadow-sm">
        <img src="https://johncanolopez-lang.github.io/Tips-Alert-1/image_1_1776808761934.jpg" class="h-14 w-auto object-contain" alt="Tips Alert">
    </div>

    <div class="p-4 mx-auto max-w-md">
        <div id="bg-branding" class="bg-white rounded-[2.5rem] p-5 shadow-2xl flex items-center gap-4 border border-slate-50 transition-colors duration-500">
            <div class="w-20 h-20 flex-shrink-0 flex items-center justify-center">
                <img id="logo-emp" src="" class="max-h-full max-w-full object-contain hidden" crossorigin="anonymous">
            </div>
            <div class="flex-1 overflow-hidden">
                <div class="overflow-hidden border-b pb-1 mb-1 border-slate-100">
                    <h1 id="nom-emp" class="text-2xl font-black italic animate-marquee text-stroke">...</h1>
                </div>
                <div class="flex justify-between items-center text-slate-400 unificado text-[10px]">
                    <span id="ciudad">---</span>
                    <span id="reloj-fecha">--:-- | --/--/--</span>
                </div>
            </div>
        </div>
    </div>

    <div class="flex justify-center p-2 gap-4 max-w-md mx-auto">
        <div id="c1" onclick="verImg(1)" class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-slate-100 hidden cursor-pointer"><img id="i1" class="w-full h-full object-cover"></div>
        <div id="c2" onclick="verImg(2)" class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-slate-100 hidden cursor-pointer"><img id="i2" class="w-full h-full object-cover"></div>
        <div id="c3" onclick="verImg(3)" class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-slate-100 hidden cursor-pointer"><img id="i3" class="w-full h-full object-cover"></div>
    </div>

    <div class="px-4 py-2 max-w-md mx-auto">
        <div class="bg-white border-[3px] border-red-600 rounded-3xl p-5 text-center shadow-lg">
            <p id="alerta" class="text-red-600 unificado tracking-tight">---</p>
        </div>
    </div>

    <div id="premium-ad" class="px-4 py-2 max-w-md mx-auto hidden">
        <div class="bg-blue-600 rounded-3xl p-5 text-center shadow-xl border-[3px] border-white">
            <p class="text-[10px] text-blue-200 font-black uppercase mb-1">Espacio Publicitario</p>
            <p id="ad-text" class="text-white unificado tracking-tight italic">---</p>
        </div>
    </div>

    <div id="servicios" class="p-4 space-y-3 max-w-md mx-auto pb-10"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const id = new URLSearchParams(window.location.search).get('id');
        let dataGlobal = {};

        function getBranding(img) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let r=0, g=0, b=0, count=0;
            for(let i=0; i<d.length; i+=100) { if(d[i+3]>128) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; count++; } }
            const color = `rgb(${Math.round(r/count)},${Math.round(g/count)},${Math.round(b/count)})`;
            return { cp: color, cs: color.replace('rgb', 'rgba').replace(')', ', 0.1)') };
        }

        function updateTime() {
            const n = new Date();
            const f = n.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'}).split('/').join(' / ');
            const h = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false});
            document.getElementById('reloj-fecha').innerText = `${h} | ${f}`;
        }
        setInterval(updateTime, 1000); updateTime();

        window.verImg = (n) => {
            const m = document.getElementById('modal');
            m.style.display = 'flex';
            document.getElementById('modal-img').src = dataGlobal.config['img'+n];
            document.getElementById('modal-desc').innerText = dataGlobal.config['desc'+n] || "";
        };

        if(id) {
            onValue(ref(db, 'usuarios/' + id), (s) => {
                if(!s.exists()) return;
                const d = s.val(); dataGlobal = d;
                document.getElementById('nom-emp').innerText = d.config?.nombre || "";
                document.getElementById('ciudad').innerText = d.config?.ubi || "";
                document.getElementById('alerta').innerText = d.mensaje?.texto || "";
                
                if(d.config?.ad) {
                    document.getElementById('ad-text').innerText = d.config.ad;
                    document.getElementById('premium-ad').classList.remove('hidden');
                }

                if(d.config?.logo) {
                    const l = document.getElementById('logo-emp');
                    l.src = d.config.logo; l.classList.remove('hidden');
                    l.onload = () => {
                        const brand = getBranding(l);
                        document.getElementById('nom-emp').style.color = brand.cp;
                        document.body.style.backgroundColor = brand.cs;
                    };
                }

                [1,2,3].forEach(n => {
                    const img = d.config['img'+n];
                    if(img) { document.getElementById('i'+n).src = img; document.getElementById('c'+n).classList.remove('hidden'); }
                });

                const list = document.getElementById('servicios'); list.innerHTML = "";
                (d.lista?.items || []).forEach(i => {
                    const [nombre, estado, link] = i.split(':').map(x => x?.trim());
                    const esRetrasado = estado?.toLowerCase().includes('retraso') || estado?.toLowerCase().includes('suspendido');
                    
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-3xl shadow-md border-l-[12px] flex flex-col gap-3 " + (esRetrasado ? 'border-red-500' : 'border-green-500');
                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="unificado text-slate-800">${nombre}</span>
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${esRetrasado ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">${estado}</span>
                        </div>
                        ${link ? `<a href="${link}" target="_blank" class="w-full text-[10px] bg-slate-100 text-slate-500 p-3 rounded-xl text-center font-black uppercase hover:bg-slate-200 transition-colors">Ver Detalles de Ruta ➔</a>` : ''}
                    `;
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
