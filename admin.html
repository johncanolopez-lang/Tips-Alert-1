<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userUID = "";
        let lB64 = "", pB64 = "";

        onAuthStateChanged(auth, (u) => {
            if(u) {
                userUID = u.uid;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                cargarDatos();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        async function cargarDatos() {
            const s = await get(ref(db, 'usuarios/' + userUID));
            if(s.exists()){
                const d = s.val();
                document.getElementById('nom').value = d.config?.nombre || "";
                document.getElementById('ub').value = d.config?.ubi || "";
                document.getElementById('ale').value = d.mensaje?.texto || "";
                document.getElementById('ite').value = (d.lista?.items || []).join('\n');
                lB64 = d.config?.logo || "";
                pB64 = d.config?.promo || "";
            }
            actualizarEnlace();
        }

        function actualizarEnlace() {
            const link = `https://johncanolopez-lang.github.io/Tips-Alert-1/index.html?id=${userUID}`;
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
            document.getElementById('btn-compartir').onclick = () => {
                const texto = `Estado del servicio: ${link}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
            };
        }

        const conv = f => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
        window.upL = async (e) => { lB64 = await conv(e.target.files[0]); alert("Logo cargado"); };
        window.upP = async (e) => { pB64 = await conv(e.target.files[0]); alert("Imagen promo cargada"); };

        window.guardar = () => {
            set(ref(db, 'usuarios/' + userUID), {
                config: { 
                    nombre: document.getElementById('nom').value, ubi: document.getElementById('ub').value,
                    logo: lB64, promo: pB64
                },
                mensaje: { texto: document.getElementById('ale').value },
                lista: { items: document.getElementById('ite').value.split('\n').filter(x => x.trim()) }
            }).then(() => alert("✅ Sincronizado"));
        };

        window.manejarAuth = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        window.salir = () => signOut(auth);
    </script>
</head>
<body class="bg-slate-100 p-4 font-sans flex flex-col items-center">
    <div id="auth-screen" class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl mt-10">
        <input id="email" type="email" placeholder="Correo" class="w-full p-4 mb-4 border rounded-2xl">
        <input id="pass" type="password" placeholder="Clave" class="w-full p-4 mb-4 border rounded-2xl">
        <button onclick="manejarAuth()" class="w-full bg-slate-900 text-white py-4 rounded-full font-black">ENTRAR</button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-2xl space-y-4">
        <div class="bg-white p-8 rounded-[3rem] shadow-xl space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input id="nom" type="text" placeholder="Empresa" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                <input id="ub" type="text" placeholder="Sede" class="p-4 bg-slate-50 border rounded-2xl font-bold">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <label class="bg-slate-800 text-white p-4 rounded-2xl text-center text-[10px] font-black cursor-pointer uppercase">Cargar Logo<input type="file" class="hidden" onchange="upL(event)"></label>
                <label class="bg-indigo-400 text-white p-4 rounded-2xl text-center text-[10px] font-black cursor-pointer uppercase">Imagen Promo<input type="file" class="hidden" onchange="upP(event)"></label>
            </div>
            <input id="ale" type="text" placeholder="ALERTA" class="w-full p-4 bg-red-50 text-red-600 font-black rounded-2xl text-center">
            <textarea id="ite" placeholder="Servicio : Estado" class="w-full p-4 bg-slate-50 border rounded-2xl h-32"></textarea>
            <button onclick="guardar()" class="w-full bg-indigo-600 text-white py-6 rounded-full font-black uppercase shadow-xl">Sincronizar Todo</button>
        </div>
        <div class="bg-slate-900 p-8 rounded-[3rem] text-center">
            <img id="qr" class="mx-auto bg-white p-4 rounded-2xl mb-4 shadow-2xl">
            <button id="btn-compartir" class="bg-green-500 text-white px-8 py-4 rounded-full font-black uppercase text-xs">Compartir WhatsApp</button>
        </div>
    </div>
</body>
</html>
