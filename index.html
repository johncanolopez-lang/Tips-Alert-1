<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .cascade-item { animation: slideUp 0.5s ease forwards; opacity: 0; }
        
        body { transition: background 0.5s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans overflow-x-hidden">

    <canvas id="colorCanvas" class="hidden"></canvas>

    <div class="max-w-md mx-auto bg-white rounded-3xl p-4 mb-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3 overflow-hidden">
            <img id="logo-img" src="" class="h-10 hidden" crossorigin="anonymous">
            <div class="overflow-hidden">
                <h1 id="nombre-empresa" class="font-black text-sm uppercase animate-marquee">Cargando...</h1>
                <p id="sede-empresa" class="text-[9px] font-bold text-slate-400"></p>
            </div>
        </div>
        <div class="text-right pl-3 border-l">
            <span id="reloj" class="font-black text-lg block">00:00</span>
            <span id="fecha" class="text-[8px] font-bold text-slate-400 uppercase">---</span>
        </div>
    </div>

    <div id="container-promo" class="max-w-md mx-auto mb-4 hidden">
        <img id="promo-img" src="" class="w-full rounded-3xl shadow-lg">
    </div>

    <div id="barra-alerta" class="max-w-md mx-auto rounded-3xl p-6 mb-4 text-white shadow-lg">
        <h2 id="texto-alerta" class="text-xl font-black italic uppercase italic">---</h2>
    </div>

    <div id="lista-servicios" class="max-w-md mx-auto space-y-3"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const userUID = urlParams.get('id');

        // LÓGICA DE COLORES AUTOMÁTICOS
        function extractColors(imgElement) {
            const canvas = document.getElementById('colorCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = imgElement.naturalWidth;
            canvas.height = imgElement.naturalHeight;
            ctx.drawImage(imgElement, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            
            let r=0, g=0, b=0, count=0;
            for(let i=0; i<data.length; i+=20) {
                if(data[i+3] > 128) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++; }
            }
            const cp = `rgb(${Math.round(r/count)},${Math.round(g/count)},${Math.round(b/count)})`;
            return { cp, ca: cp, cs: `rgba(${Math.round(r/count)},${Math.round(g/count)},${Math.round(b/count)}, 0.1)` };
        }

        function updateTime() {
            const n = new Date();
            document.getElementById('reloj').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('fecha').innerText = n.toLocaleDateString('es-ES', {day:'numeric', month:'short'});
        }
        setInterval(updateTime, 1000); updateTime();

        if(userUID) {
            onValue(ref(db, 'usuarios/' + userUID), (s) => {
                const d = s.val();
                document.getElementById('nombre-empresa').innerText = d.config.nombre;
                document.getElementById('sede-empresa').innerText = d.config.ubi;
                document.getElementById('texto-alerta').innerText = d.mensaje.texto;
                
                const logo = document.getElementById('logo-img');
                if(d.config.logo) {
                    logo.src = d.config.logo;
                    logo.classList.remove('hidden');
                    logo.onload = () => {
                        const colors = extractColors(logo);
                        document.getElementById('nombre-empresa').style.color = colors.cp;
                        document.getElementById('barra-alerta').style.backgroundColor = colors.ca;
                        document.body.style.backgroundColor = colors.cs;
                        
                        // Renderizar servicios con cascada
                        const lista = document.getElementById('lista-servicios');
                        lista.innerHTML = "";
                        d.lista.items.forEach((item, index) => {
                            const [n, e] = item.split(':');
                            const div = document.createElement('div');
                            div.className = "bg-white p-5 rounded-[2rem] flex justify-between items-center shadow-sm cascade-item";
                            div.style.animationDelay = `${index * 0.1}s`;
                            div.style.borderLeft = `8px solid ${colors.cp}`;
                            div.innerHTML = `<span class="font-bold text-xs uppercase">${n}</span><span class="font-black text-xs" style="color:${colors.cp}">${e}</span>`;
                            lista.appendChild(div);
                        });
                    };
                }
                
                if(d.config.promo) {
                    document.getElementById('promo-img').src = d.config.promo;
                    document.getElementById('container-promo').classList.remove('hidden');
                }
            });
        }
    </script>
</body>
</html>
