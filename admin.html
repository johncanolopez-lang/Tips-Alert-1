<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userUID = "";
        let files = { logo: "", img1: "", img2: "", img3: "" };

        // Persistencia de sesión
        onAuthStateChanged(auth, (u) => {
            if(u) { 
                userUID = u.uid; 
                cargarDatos(); 
                document.getElementById('admin-panel').classList.remove('hidden'); 
                document.getElementById('auth-screen').classList.add('hidden');
            } else { 
                document.getElementById('auth-screen').classList.remove('hidden'); 
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        // Convertir imagen a Base64
        const conv = f => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
        
        window.upFile = async (e, key) => { 
            if (e.target.files[0]) {
                files[key] = await conv(e.target.files[0]); 
                alert("Imagen de " + key + " cargada temporalmente. Recuerda Guardar para sincronizar."); 
            }
        };

        // Guardar en base de datos
        window.guardar = () => {
            if(!userUID) return alert("Error: No hay sesión activa.");
            
            set(ref(db, 'usuarios/' + userUID), {
                config: { 
                    nombre: document.getElementById('nom').value, 
                    ubi: document.getElementById('ub').value,
                    logo: files.logo, 
                    img1: files.img1, desc1: document.getElementById('d1').value,
                    img2: files.img2, desc2: document.getElementById('d2').value,
                    img3: files.img3, desc3: document.getElementById('d3').value
                },
                mensaje: { texto: document.getElementById('ale').value },
                lista: { items: document.getElementById('ite').value.split('\n').filter(x => x.trim()) }
            }).then(() => { 
                alert("✅ Datos sincronizados correctamente."); 
                actualizarQR(); 
            }).catch(err => alert("Error al guardar: " + err.message));
        };

        // Actualizar QR y enlace de WhatsApp
        function actualizarQR() {
            const link = `https://johncanolopez-lang.github.io/Tips-Alert-1/index.html?id=${userUID}`;
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
            
            document.getElementById('btn-wa').onclick = () => {
                const msg = encodeURIComponent("🔔 ¡Hola! Mira las novedades del servicio aquí: " + link);
                window.open(`https://wa.me/573242705861?text=${msg}`);
            };
        }

        // Cargar datos existentes
        async function cargarDatos() {
            const s = await get(ref(db, 'usuarios/' + userUID));
            if(s.exists()){
                const d = s.val();
                document.getElementById('nom').value = d.config?.nombre || "";
                document.getElementById('ub').value = d.config?.ubi || "";
                document.getElementById('ale').value = d.mensaje?.texto || "";
                document.getElementById('d1').value = d.config?.desc1 || "";
                document.getElementById('d2').value = d.config?.desc2 || "";
                document.getElementById('d3').value = d.config?.desc3 || "";
                document.getElementById('ite').value = (d.lista?.items || []).join('\n');
                files = { 
                    logo: d.config?.logo || "", 
                    img1: d.config?.img1 || "", 
                    img2: d.config?.img2 || "", 
                    img3: d.config?.img3 || "" 
                };
            }
            actualizarQR();
        }

        window.manejarAuth = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Error de acceso: " + err.message));
        };
    </script>
</head>
<body class="bg-slate-100 p-4 font-sans flex flex-col items-center">
    
    <div id="auth-screen" class="hidden max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl mt-10">
        <h2 class="text-center font-black text-slate-800 mb-6 uppercase tracking-widest">Login Admin</h2>
        <input id="email" type="email" placeholder="Correo electrónico" class="w-full p-4 mb-4 border rounded-2xl outline-none text-center font-bold">
        <input id="pass" type="password" placeholder="Contraseña" class="w-full p-4 mb-6 border rounded-2xl outline-none text-center font-bold">
        <button onclick="manejarAuth()" class="w-full bg-blue-600 text-white py-4 rounded-full font-black uppercase shadow-lg active:scale-95 transition-transform">Ingresar</button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-md space-y-4 pb-20">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <input id="nom" type="text" placeholder="NOMBRE EMPRESA" class="p-3 border rounded-xl font-bold uppercase bg-slate-50 text-center">
                <input id="ub" type="text" placeholder="CIUDAD / ZONA" class="p-3 border rounded-xl font-bold uppercase bg-slate-50 text-center">
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <label class="bg-black text-white p-3 rounded-xl text-[10px] text-center cursor-pointer font-black uppercase">Subir Logo<input type="file" class="hidden" onchange="upFile(event, 'logo')"></label>
                <label class="bg-blue-600 text-white p-3 rounded-xl text-[10px] text-center cursor-pointer font-black uppercase">Foto Circular 1<input type="file" class="hidden" onchange="upFile(event, 'img1')"></label>
                <label class="bg-blue-600 text-white p-3 rounded-xl text-[10px] text-center cursor-pointer font-black uppercase">Foto Circular 2<input type="file" class="hidden" onchange="upFile(event, 'img2')"></label>
                <label class="bg-blue-600 text-white p-3 rounded-xl text-[10px] text-center cursor-pointer font-black uppercase">Foto Circular 3<input type="file" class="hidden" onchange="upFile(event, 'img3')"></label>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <input id="d1" type="text" placeholder="Nombre 1" class="p-2 border rounded-lg text-center text-[10px] font-bold">
                <input id="d2" type="text" placeholder="Nombre 2" class="p-2 border rounded-lg text-center text-[10px] font-bold">
                <input id="d3" type="text" placeholder="Nombre 3" class="p-2 border rounded-lg text-center text-[10px] font-bold">
            </div>

            <input id="ale" type="text" placeholder="MENSAJE DE ALERTA (EJ: OPERACIÓN NORMAL)" class="w-full p-4 border-2 border-red-500 text-red-600 rounded-2xl font-black uppercase text-center outline-none bg-red-50">
            
            <div class="bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-300">
                <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase text-center">Servicios (Ruta : Estado : Link)</p>
                <textarea id="ite" placeholder="Línea 1 : NORMAL : https://maps.link" class="w-full p-4 bg-white border rounded-xl h-32 text-xs font-mono outline-none"></textarea>
            </div>
            
            <button onclick="guardar()" class="w-full bg-green-600 text-white py-5 rounded-full font-black uppercase shadow-xl active:scale-95 transition-transform">Guardar y Sincronizar</button>
        </div>
        
        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-center shadow-2xl">
            <p class="text-white text-[10px] font-black mb-4 uppercase tracking-widest">Código QR de Acceso</p>
            <img id="qr" class="mx-auto bg-white p-4 rounded-3xl mb-6 w-48 h-48 shadow-inner">
            <button id="btn-wa" class="w-full bg-green-500 text-white py-3 rounded-full font-black uppercase text-[11px] shadow-lg">Compartir por WhatsApp</button>
        </div>
    </div>
</body>
</html>
