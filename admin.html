<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userUID = "";
        let files = { logo: "", img1: "", img2: "", img3: "" };

        onAuthStateChanged(auth, (u) => {
            if(u) { userUID = u.uid; cargarDatos(); document.getElementById('admin-panel').classList.remove('hidden'); }
            else { document.getElementById('auth-screen').classList.remove('hidden'); }
        });

        const conv = f => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
        window.upFile = async (e, key) => { files[key] = await conv(e.target.files[0]); alert("Imagen cargada"); };

        window.guardar = () => {
            set(ref(db, 'usuarios/' + userUID), {
                config: { 
                    nombre: document.getElementById('nom').value, ubi: document.getElementById('ub').value,
                    logo: files.logo, img1: files.img1, desc1: document.getElementById('d1').value,
                    img2: files.img2, desc2: document.getElementById('d2').value,
                    img3: files.img3, desc3: document.getElementById('d3').value,
                    ad: document.getElementById('ad_text').value
                },
                mensaje: { texto: document.getElementById('ale').value },
                lista: { items: document.getElementById('ite').value.split('\n').filter(x => x.trim()) }
            }).then(() => { alert("✅ Sincronizado correctamente"); actualizarQR(); });
        };

        function actualizarQR() {
            const link = `https://johncanolopez-lang.github.io/Tips-Alert-1/index.html?id=${userUID}`;
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
            document.getElementById('btn-wa').onclick = () => window.open(`https://api.whatsapp.com/send?phone=573242705861&text=${encodeURIComponent("🔔 Hola! Mira las actualizaciones aquí: " + link)}`);
        }

        async function cargarDatos() {
            const s = await get(ref(db, 'usuarios/' + userUID));
            if(s.exists()){
                const d = s.val();
                document.getElementById('nom').value = d.config?.nombre || "";
                document.getElementById('ub').value = d.config?.ubi || "";
                document.getElementById('ale').value = d.mensaje?.texto || "";
                document.getElementById('ad_text').value = d.config?.ad || "";
                document.getElementById('d1').value = d.config?.desc1 || "";
                document.getElementById('d2').value = d.config?.desc2 || "";
                document.getElementById('d3').value = d.config?.desc3 || "";
                document.getElementById('ite').value = (d.lista?.items || []).join('\n');
                files = { logo: d.config?.logo||"", img1: d.config?.img1||"", img2: d.config?.img2||"", img3: d.config?.img3||"" };
            }
            actualizarQR();
        }
        window.manejarAuth = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
    </script>
</head>
<body class="bg-slate-100 p-4 font-sans flex flex-col items-center">
    <div id="auth-screen" class="hidden max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl mt-10">
        <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 border rounded-2xl outline-none">
        <input id="pass" type="password" placeholder="Password" class="w-full p-4 mb-6 border rounded-2xl outline-none">
        <button onclick="manejarAuth()" class="w-full bg-blue-600 text-white py-4 rounded-full font-black uppercase shadow-lg">Entrar</button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-md space-y-4 pb-20">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <input id="nom" type="text" placeholder="Empresa" class="p-3 border rounded-xl font-bold uppercase bg-slate-50">
                <input id="ub" type="text" placeholder="Ciudad" class="p-3 border rounded-xl font-bold uppercase bg-slate-50">
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <label class="bg-black text-white p-2 rounded-lg text-[9px] text-center cursor-pointer uppercase font-black">Logo Empresa<input type="file" class="hidden" onchange="upFile(event, 'logo')"></label>
                <label class="bg-blue-600 text-white p-2 rounded-lg text-[9px] text-center cursor-pointer uppercase font-black">Foto 1<input type="file" class="hidden" onchange="upFile(event, 'img1')"></label>
                <label class="bg-blue-600 text-white p-2 rounded-lg text-[9px] text-center cursor-pointer uppercase font-black">Foto 2<input type="file" class="hidden" onchange="upFile(event, 'img2')"></label>
                <label class="bg-blue-600 text-white p-2 rounded-lg text-[9px] text-center cursor-pointer uppercase font-black">Foto 3<input type="file" class="hidden" onchange="upFile(event, 'img3')"></label>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <input id="d1" type="text" placeholder="Desc 1" class="p-2 border rounded-lg text-[10px]">
                <input id="d2" type="text" placeholder="Desc 2" class="p-2 border rounded-lg text-[10px]">
                <input id="d3" type="text" placeholder="Desc 3" class="p-2 border rounded-lg text-[10px]">
            </div>

            <input id="ale" type="text" placeholder="ALERTA (ROJO)" class="w-full p-3 border-2 border-red-500 text-red-600 rounded-xl font-black uppercase text-center outline-none">
            <input id="ad_text" type="text" placeholder="ANUNCIO (AZUL)" class="w-full p-3 bg-blue-50 border rounded-xl text-blue-800 font-bold italic outline-none">
            
            <textarea id="ite" placeholder="Ruta : ESTADO : Link" class="w-full p-4 bg-slate-50 border rounded-xl h-32 text-xs font-mono outline-none"></textarea>
            
            <button onclick="guardar()" class="w-full bg-green-600 text-white py-4 rounded-full font-black uppercase shadow-xl">Guardar</button>
        </div>
        
        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-center shadow-2xl">
            <img id="qr" class="mx-auto bg-white p-3 rounded-2xl mb-4 w-40">
            <button id="btn-wa" class="bg-green-500 text-white px-8 py-3 rounded-full font-black uppercase text-[10px] shadow-lg">Enviar QR por WhatsApp</button>
        </div>
    </div>
</body>
</html>
