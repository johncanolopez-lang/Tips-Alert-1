<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userUID = "";
        let files = { logo: "", img1: "", img2: "", img3: "" };

        onAuthStateChanged(auth, (u) => {
            if(u) { userUID = u.uid; cargarDatos(); document.getElementById('admin-panel').classList.remove('hidden'); }
            else { document.getElementById('auth-screen').classList.remove('hidden'); }
        });

        const conv = f => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
        window.upFile = async (e, key) => { files[key] = await conv(e.target.files[0]); alert("Imagen lista"); };

        window.guardar = () => {
            set(ref(db, 'usuarios/' + userUID), {
                config: { 
                    nombre: document.getElementById('nom').value, ubi: document.getElementById('ub').value,
                    logo: files.logo, img1: files.img1, desc1: document.getElementById('d1').value,
                    img2: files.img2, desc2: document.getElementById('d2').value,
                    img3: files.img3, desc3: document.getElementById('d3').value,
                    ad: document.getElementById('ad_text').value
                },
                mensaje: { texto: document.getElementById('ale').value },
                lista: { items: document.getElementById('ite').value.split('\n').filter(x => x.trim()) }
            }).then(() => alert("✅ Datos Sincronizados"));
        };

        async function cargarDatos() {
            const s = await get(ref(db, 'usuarios/' + userUID));
            if(s.exists()){
                const d = s.val();
                document.getElementById('nom').value = d.config?.nombre || "";
                document.getElementById('ub').value = d.config?.ubi || "";
                document.getElementById('ale').value = d.mensaje?.texto || "";
                document.getElementById('ad_text').value = d.config?.ad || "";
                document.getElementById('d1').value = d.config?.desc1 || "";
                document.getElementById('d2').value = d.config?.desc2 || "";
                document.getElementById('d3').value = d.config?.desc3 || "";
                document.getElementById('ite').value = (d.lista?.items || []).join('\n');
                files = { logo: d.config?.logo||"", img1: d.config?.img1||"", img2: d.config?.img2||"", img3: d.config?.img3||"" };
            }
        }
        window.manejarAuth = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
    </script>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div id="auth-screen" class="hidden max-w-md mx-auto bg-white p-8 rounded-3xl mt-10 shadow">
        <input id="email" type="email" placeholder="Email" class="w-full p-3 mb-4 border rounded-xl">
        <input id="pass" type="password" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl">
        <button onclick="manejarAuth()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">ENTRAR</button>
    </div>

    <div id="admin-panel" class="hidden max-w-md mx-auto space-y-4 pb-20">
        <div class="bg-white p-6 rounded-[2rem] shadow-lg space-y-3">
            <input id="nom" type="text" placeholder="Nombre Empresa" class="w-full p-3 border rounded-xl font-bold">
            <input id="ub" type="text" placeholder="Ciudad" class="w-full p-3 border rounded-xl font-bold">
            <div class="grid grid-cols-2 gap-2">
                <label class="bg-black text-white p-2 rounded-lg text-center text-[10px] cursor-pointer">LOGO EMPRESA<input type="file" class="hidden" onchange="upFile(event, 'logo')"></label>
                <label class="bg-blue-600 text-white p-2 rounded-lg text-center text-[10px] cursor-pointer">FOTO 1<input type="file" class="hidden" onchange="upFile(event, 'img1')"></label>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <input id="d1" type="text" placeholder="Desc 1" class="border p-1 text-[10px] rounded">
                <input id="d2" type="text" placeholder="Desc 2" class="border p-1 text-[10px] rounded">
                <input id="d3" type="text" placeholder="Desc 3" class="border p-1 text-[10px] rounded">
            </div>
            <input id="ale" type="text" placeholder="MENSAJE ROJO (ALERTA)" class="w-full p-3 border-2 border-red-500 rounded-xl text-red-600 font-black">
            <input id="ad_text" type="text" placeholder="ANUNCIO AZUL" class="w-full p-3 bg-blue-50 border rounded-xl">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Servicios (Nombre : Estado : Link)</p>
            <textarea id="ite" placeholder="Ruta : NORMAL : http://..." class="w-full p-3 border rounded-xl h-32 text-xs font-mono"></textarea>
            <button onclick="guardar()" class="w-full bg-green-600 text-white py-4 rounded-full font-black uppercase">Sincronizar Todo</button>
        </div>
    </div>
</body>
</html>
