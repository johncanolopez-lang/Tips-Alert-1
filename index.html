<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert - Visualizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        body, h1, div { transition: all 0.5s ease; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div class="bg-white shadow-lg p-4 flex flex-col items-center">
        <img id="logo-img" src="" class="h-20 mb-2 hidden" alt="Logo">
        
        <div class="w-full overflow-hidden">
            <h1 id="nombre-empresa" class="text-4xl font-black italic uppercase tracking-tighter animate-marquee">
                Cargando...
            </h1>
        </div>
        <p id="sede-empresa" class="text-sm font-bold text-slate-400 uppercase tracking-widest"></p>
    </div>

    <div id="barra-alerta" class="p-6 text-center shadow-inner">
        <p id="texto-alerta" class="font-black italic uppercase text-2xl leading-tight"></p>
    </div>

    <div class="p-4 max-w-lg mx-auto space-y-3" id="lista-servicios">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const userUID = urlParams.get('id');

        if (userUID) {
            onValue(ref(db, 'usuarios/' + userUID), (snapshot) => {
                if (snapshot.exists()) {
                    const d = snapshot.val();
                    const c = d.config?.colores || { primario: "#000000", secundario: "#ffffff", acento: "#ff0000" };

                    // Textos y Logo
                    document.getElementById('nombre-empresa').innerText = d.config?.nombre || "";
                    document.getElementById('sede-empresa').innerText = d.config?.ubi || "";
                    document.getElementById('texto-alerta').innerText = d.mensaje?.texto || "SIN NOVEDAD";
                    
                    const imgLogo = document.getElementById('logo-img');
                    if(d.config?.logo) {
                        imgLogo.src = d.config.logo;
                        imgLogo.classList.remove('hidden');
                    }

                    // Aplicar Colores 60-30-10
                    document.getElementById('nombre-empresa').style.color = c.primario;
                    document.body.style.backgroundColor = c.secundario + "15"; 
                    const barra = document.getElementById('barra-alerta');
                    barra.style.backgroundColor = c.acento;
                    barra.style.color = "#ffffff";

                    // Servicios
                    const lista = document.getElementById('lista-servicios');
                    lista.innerHTML = "";
                    (d.lista?.items || []).forEach(item => {
                        const [nom, est] = item.split(':');
                        const card = document.createElement('div');
                        card.className = "bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center border-l-[12px]";
                        card.style.borderColor = c.primario;
                        card.innerHTML = `<span class="font-bold uppercase text-lg">${nom}</span><span class="font-black italic text-sm" style="color:${c.primario}">${est}</span>`;
                        lista.appendChild(card);
                    });
                }
            });
        }
    </script>
</body>
</html>
