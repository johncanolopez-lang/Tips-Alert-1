<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 10s linear infinite; }
        /* COLOR CORPORATIVO FORZADO Y FILETE */
        .text-stroke { 
            -webkit-text-stroke: 1.2px black; 
            paint-order: stroke fill; 
            color: #00A82D !important; /* Verde Megabús */
        }
        .unificado { font-size: 14px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="bg-white min-h-screen font-sans overflow-x-hidden">

    <canvas id="canvas" class="hidden"></canvas>

    <div class="w-full bg-white py-3 flex justify-center border-b sticky top-0 z-40 shadow-sm">
        <img src="logo_tips.jpg" class="w-[90%] max-w-md h-12 object-contain" alt="Tips Alert" onerror="this.src='https://johncanolopez-lang.github.io/Tips-Alert-1/logo_tips.jpg'">
    </div>

    <div class="p-4 mx-auto max-w-md">
        <div class="bg-white rounded-[2.5rem] p-5 shadow-2xl border border-slate-50">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-16 h-16 flex-shrink-0 flex items-center justify-center">
                    <img id="logo-emp" src="" class="max-h-full max-w-full object-contain hidden" crossorigin="anonymous">
                </div>
                <div class="flex-1 overflow-hidden border-b border-slate-100 pb-1">
                    <h1 id="nom-emp" class="text-3xl font-black italic animate-marquee text-stroke">CARGANDO...</h1>
                </div>
            </div>
            
            <div class="flex justify-between items-center px-1">
                <div class="flex flex-col">
                    <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Ubicación</span>
                    <span id="ciudad" class="text-[12px] font-black text-slate-700 uppercase tracking-tighter">---</span>
                </div>
                <div class="flex flex-col text-right border-l border-slate-100 pl-4">
                    <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Fecha y Hora</span>
                    <span id="reloj-fecha" class="text-[12px] font-black text-slate-700">--:-- | --/--/--</span>
                </div>
            </div>
        </div>
    </div>

    <div class="flex justify-center p-2 gap-4 max-w-md mx-auto">
        <div id="c1" class="hidden flex flex-col items-center w-24">
            <div class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-slate-100"><img id="i1" class="w-full h-full object-cover"></div>
            <span id="t1" class="text-[9px] font-black text-center mt-2 uppercase text-slate-500 leading-tight"></span>
        </div>
        <div id="c2" class="hidden flex flex-col items-center w-24">
            <div class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-slate-100"><img id="i2" class="w-full h-full object-cover"></div>
            <span id="t2" class="text-[9px] font-black text-center mt-2 uppercase text-slate-500 leading-tight"></span>
        </div>
        <div id="c3" class="hidden flex flex-col items-center w-24">
            <div class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-slate-100"><img id="i3" class="w-full h-full object-cover"></div>
            <span id="t3" class="text-[9px] font-black text-center mt-2 uppercase text-slate-500 leading-tight"></span>
        </div>
    </div>

    <div class="px-4 py-2 max-w-md mx-auto">
        <div class="bg-white border-[3px] border-red-600 rounded-3xl p-5 text-center shadow-lg">
            <p id="alerta" class="text-red-600 unificado">OPERACIÓN NORMAL</p>
        </div>
    </div>

    <div id="premium-ad" class="px-4 py-2 max-w-md mx-auto hidden">
        <div class="bg-blue-600 rounded-3xl p-4 text-center shadow-xl border-2 border-white">
            <p id="ad-text" class="text-white unificado italic text-xs tracking-tighter">---</p>
        </div>
    </div>

    <div id="servicios" class="p-4 space-y-4 max-w-md mx-auto pb-20"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const id = new URLSearchParams(window.location.search).get('id');

        function updateTime() {
            const n = new Date();
            const f = n.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'}).split('/').join(' / ');
            const h = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false});
            document.getElementById('reloj-fecha').innerText = `${h} | ${f}`;
        }
        setInterval(updateTime, 1000); updateTime();

        if(id) {
            onValue(ref(db, 'usuarios/' + id), (s) => {
                if(!s.exists()) return;
                const d = s.val();
                document.getElementById('nom-emp').innerText = d.config?.nombre || "";
                document.getElementById('ciudad').innerText = d.config?.ubi || "";
                document.getElementById('alerta').innerText = d.mensaje?.texto || "SIN NOVEDADES";
                
                if(d.config?.ad) {
                    document.getElementById('ad-text').innerText = d.config.ad;
                    document.getElementById('premium-ad').classList.remove('hidden');
                }

                if(d.config?.logo) {
                    const l = document.getElementById('logo-emp'); l.src = d.config.logo; l.classList.remove('hidden');
                }

                [1,2,3].forEach(n => {
                    const img = d.config['img'+n];
                    if(img) { 
                        document.getElementById('i'+n).src = img; 
                        document.getElementById('t'+n).innerText = d.config['desc'+n] || "";
                        document.getElementById('c'+n).classList.remove('hidden'); 
                    }
                });

                const list = document.getElementById('servicios'); list.innerHTML = "";
                (d.lista?.items || []).forEach(i => {
                    const [nombre, estado, link] = i.split(':').map(x => x?.trim());
                    const esRetrasado = estado?.toLowerCase().includes('retraso');
                    
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-[2.5rem] shadow-lg border-l-[12px] flex flex-col gap-4 " + (esRetrasado ? 'border-red-600' : 'border-green-600');
                    div.innerHTML = `
                        ${link ? `<a href="${link}" target="_blank" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-center font-black uppercase text-[10px] shadow-lg active:scale-95 transition-transform">Ir a la Web del Cliente ➔</a>` : ''}
                        <div class="flex justify-between items-center px-1">
                            <span class="unificado text-slate-800 text-xs">${nombre}</span>
                            <span class="unificado ${esRetrasado ? 'text-red-600' : 'text-green-600'} text-[11px]">${estado}</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
