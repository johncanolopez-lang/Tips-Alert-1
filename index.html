<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 12s linear infinite; }
        .text-stroke { -webkit-text-stroke: 1.5px black; paint-order: stroke fill; }
        
        /* Efecto Lupa para las imágenes */
        .zoom-img { transition: all 0.3s ease; cursor: zoom-in; }
        .zoom-img:active { 
            transform: scale(2.5); 
            z-index: 100; 
            position: relative; 
            border-radius: 15px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col overflow-x-hidden">

    <canvas id="canvas" class="hidden"></canvas>

    <div class="flex-grow p-4 mx-auto max-w-md w-full space-y-4">
        
        <div class="bg-white rounded-[2.5rem] p-5 shadow-2xl border border-slate-100 mt-2">
            <div class="flex items-center gap-4 mb-3">
                <div class="w-14 h-14 flex-shrink-0 flex items-center justify-center">
                    <img id="logo-emp" src="" class="max-h-full max-w-full object-contain hidden" crossorigin="anonymous">
                </div>
                <div class="flex-1 overflow-hidden border-b border-slate-100 pb-1">
                    <h1 id="nom-emp" class="text-3xl font-black italic animate-marquee text-stroke uppercase">Cargando...</h1>
                </div>
            </div>
            
            <div class="flex justify-between items-center px-1 font-black text-slate-700 text-[11px] uppercase tracking-tighter">
                <span id="ciudad">---</span>
                <span id="reloj-fecha">--:-- | -- / -- / --</span>
            </div>
        </div>

        <div class="flex justify-around items-start p-2 gap-2">
            <div id="c1" class="hidden flex flex-col items-center w-28 text-center">
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-white zoom-img">
                    <img id="i1" class="w-full h-full object-cover">
                </div>
                <span id="t1" class="text-[9px] font-black uppercase text-slate-500 mt-2 leading-tight"></span>
            </div>
            <div id="c2" class="hidden flex flex-col items-center w-28 text-center">
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-white zoom-img">
                    <img id="i2" class="w-full h-full object-cover">
                </div>
                <span id="t2" class="text-[9px] font-black uppercase text-slate-500 mt-2 leading-tight"></span>
            </div>
            <div id="c3" class="hidden flex flex-col items-center w-28 text-center">
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-white zoom-img">
                    <img id="i3" class="w-full h-full object-cover">
                </div>
                <span id="t3" class="text-[9px] font-black uppercase text-slate-500 mt-2 leading-tight"></span>
            </div>
        </div>

        <div class="bg-white border-[3px] border-red-600 rounded-[2rem] p-5 text-center shadow-xl">
            <p id="alerta" class="text-red-600 font-black uppercase text-sm italic tracking-tight">OPERACIÓN ACTUAL</p>
        </div>

        <div id="servicios" class="space-y-4 pb-12"></div>
    </div>

    <footer class="p-6 w-full max-w-md mx-auto text-center">
        <a href="https://wa.me/573242705861" target="_blank" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
            Created by Tips Alert ➔
        </a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const id = new URLSearchParams(window.location.search).get('id');

        // FUNCIÓN: Extrae color y fuerza el verde si es el dominante
        function getAutoColor(img) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let r=0, g=0, b=0, count=0;
            for(let i=0; i<data.length; i+=100) {
                if(data[i+3] > 150) { r += data[i]; g += data[i+1]; b += data[i+2]; count++; }
            }
            // Retorna el color detectado (ideal para Megabús que es verde)
            return count > 0 ? `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})` : '#00A82D';
        }

        function clock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'}).replace(/\//g, ' / ');
            const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false});
            document.getElementById('reloj-fecha').innerText = `${timeStr} | ${dateStr}`;
        }
        setInterval(clock, 1000); clock();

        if(id) {
            onValue(ref(db, 'usuarios/' + id), (snap) => {
                const d = snap.val();
                if(!d) return;

                document.getElementById('nom-emp').innerText = d.config?.nombre || "EMPRESA";
                document.getElementById('ciudad').innerText = d.config?.ubi || "CIUDAD";
                document.getElementById('alerta').innerText = d.mensaje?.texto || "SIN NOVEDADES";

                if(d.config?.logo) {
                    const l = document.getElementById('logo-emp');
                    l.src = d.config.logo;
                    l.classList.remove('hidden');
                    l.onload = () => { document.getElementById('nom-emp').style.color = getAutoColor(l); };
                }

                [1,2,3].forEach(n => {
                    if(d.config['img'+n]) {
                        document.getElementById('i'+n).src = d.config['img'+n];
                        document.getElementById('t'+n).innerText = d.config['desc'+n] || "";
                        document.getElementById('c'+n).classList.remove('hidden');
                    }
                });

                const list = document.getElementById('servicios');
                list.innerHTML = "";
                (d.lista?.items || []).forEach(item => {
                    const [nombre, estado, link] = item.split(':').map(s => s?.trim());
                    
                    // LÓGICA DE COLORES POR ESTADO
                    const esRetraso = estado?.toUpperCase().includes('RETRASO') || estado?.toUpperCase().includes('RETRASADA');
                    const esNormal = estado?.toUpperCase().includes('NORMAL') || estado?.toUpperCase().includes('DESPACHADA');
                    
                    let colorTexto = "text-slate-600"; // Color por defecto
                    if(esRetraso) colorTexto = "text-red-600";
                    if(esNormal) colorTexto = "text-green-600";

                    const div = document.createElement('div');
                    div.className = `bg-white p-5 rounded-[2.5rem] shadow-xl border-l-[12px] flex flex-col gap-4 ${esRetraso ? 'border-red-600' : 'border-green-600'}`;
                    div.innerHTML = `
                        ${link ? `<a href="${link}" target="_blank" class="w-full bg-[#0F172A] text-white py-4 rounded-2xl text-center font-black uppercase text-[12px] shadow-lg tracking-wider">Ruta Alimentadora ➔</a>` : ''}
                        <div class="flex justify-between items-center px-1">
                            <span class="font-black text-slate-800 text-[14px] uppercase">${nombre}</span>
                            <span class="font-black ${colorTexto} text-[13px] uppercase">${estado}</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
