<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 10s linear infinite; }
        /* FILETE NEGRO Y COLOR VERDE PRIORITARIO */
        .text-stroke { 
            -webkit-text-stroke: 1.5px black; 
            paint-order: stroke fill; 
            color: #00A82D !important; /* Verde Megabús */
        }
    </style>
</head>
<body class="bg-white min-h-screen font-sans">

    <div class="w-full bg-white py-2 flex justify-center border-b sticky top-0 z-50">
        <img src="logo_tips.jpg" class="w-full max-w-md px-4 h-14 object-fill" onerror="this.src='https://johncanolopez-lang.github.io/Tips-Alert-1/logo_tips.jpg'">
    </div>

    <div class="p-4 mx-auto max-w-md space-y-4">
        <div class="bg-white rounded-[2.5rem] p-5 shadow-2xl border border-slate-100">
            <div class="flex items-center gap-4 mb-4">
                <img id="logo-emp" src="" class="h-16 w-16 object-contain hidden">
                <div class="flex-1 overflow-hidden border-b-2 border-slate-100 pb-1">
                    <h1 id="nom-emp" class="text-3xl font-black italic animate-marquee text-stroke">...</h1>
                </div>
            </div>
            <div class="flex justify-between items-start">
                <div class="flex flex-col">
                    <span class="text-[9px] text-slate-400 font-black uppercase">Ubicación</span>
                    <span id="ciudad" class="text-[12px] font-black text-slate-800 uppercase">---</span>
                </div>
                <div class="flex flex-col text-right">
                    <span class="text-[9px] text-slate-400 font-black uppercase">Fecha y Hora</span>
                    <span id="reloj" class="text-[12px] font-black text-slate-800">--:-- | --/--/--</span>
                </div>
            </div>
        </div>

        <div class="flex justify-around items-start">
            <div id="c1" class="hidden flex flex-col items-center w-24">
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-lg overflow-hidden bg-slate-50">
                    <img id="i1" class="w-full h-full object-cover">
                </div>
                <span id="t1" class="text-[10px] font-bold text-center mt-2 uppercase text-slate-600"></span>
            </div>
            <div id="c2" class="hidden flex flex-col items-center w-24">
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-lg overflow-hidden bg-slate-50">
                    <img id="i2" class="w-full h-full object-cover">
                </div>
                <span id="t2" class="text-[10px] font-bold text-center mt-2 uppercase text-slate-600"></span>
            </div>
            <div id="c3" class="hidden flex flex-col items-center w-24">
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-lg overflow-hidden bg-slate-50">
                    <img id="i3" class="w-full h-full object-cover">
                </div>
                <span id="t3" class="text-[10px] font-bold text-center mt-2 uppercase text-slate-600"></span>
            </div>
        </div>

        <div class="bg-white border-[3px] border-red-600 rounded-3xl p-5 text-center shadow-lg">
            <p id="alerta" class="text-red-600 font-black text-sm uppercase">SIN NOVEDADES</p>
        </div>

        <div id="premium-ad" class="hidden bg-blue-600 rounded-3xl p-4 text-center shadow-xl border-2 border-white">
            <p id="ad-text" class="text-white font-black italic text-xs uppercase tracking-tighter"></p>
        </div>

        <div id="servicios" class="space-y-4 pb-20"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const id = new URLSearchParams(window.location.search).get('id');

        function updateTime() {
            const n = new Date();
            const f = n.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'}).split('/').join(' / ');
            const h = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false});
            document.getElementById('reloj').innerText = `${h} | ${f}`;
        }
        setInterval(updateTime, 1000); updateTime();

        if(id) {
            onValue(ref(db, 'usuarios/' + id), (s) => {
                if(!s.exists()) return;
                const d = s.val();
                document.getElementById('nom-emp').innerText = d.config?.nombre || "";
                document.getElementById('ciudad').innerText = d.config?.ubi || "";
                document.getElementById('alerta').innerText = d.mensaje?.texto || "OPERACIÓN NORMAL";
                
                if(d.config?.ad) {
                    document.getElementById('ad-text').innerText = d.config.ad;
                    document.getElementById('premium-ad').classList.remove('hidden');
                }

                if(d.config?.logo) { 
                    const l = document.getElementById('logo-emp'); 
                    l.src = d.config.logo; l.classList.remove('hidden'); 
                }

                [1,2,3].forEach(n => {
                    if(d.config['img'+n]) {
                        document.getElementById('i'+n).src = d.config['img'+n];
                        document.getElementById('t'+n).innerText = d.config['desc'+n] || "";
                        document.getElementById('c'+n).classList.remove('hidden');
                    }
                });

                const list = document.getElementById('servicios'); list.innerHTML = "";
                (d.lista?.items || []).forEach(i => {
                    const [nombre, estado, link] = i.split(':').map(x => x?.trim());
                    const esRetrasado = estado?.toLowerCase().includes('retraso');
                    
                    const div = document.createElement('div');
                    div.className = `bg-white p-5 rounded-[2rem] shadow-xl border-l-[12px] flex flex-col gap-3 ${esRetrasado ? 'border-red-600' : 'border-green-600'}`;
                    div.innerHTML = `
                        ${link ? `<a href="${link}" target="_blank" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-center font-black text-[10px] uppercase shadow-md">Ir a la Web del Cliente ➔</a>` : ''}
                        <div class="flex justify-between items-center px-1">
                            <span class="font-black text-slate-800 uppercase text-xs">${nombre}</span>
                            <span class="font-black text-[10px] uppercase ${esRetrasado ? 'text-red-600' : 'text-green-600'}">${estado}</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
