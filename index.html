<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert - Estado del Servicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: all 0.5s ease; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .bg-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen font-sans p-4">

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] p-4 mb-4 flex justify-between items-center card-shadow border border-slate-100">
        <div class="flex items-center gap-3">
            <img id="logo-img" src="" class="h-12 w-auto hidden" alt="Logo">
            <div class="flex flex-col">
                <span id="nombre-empresa" class="font-black text-slate-800 leading-none text-lg">Cargando...</span>
                <span id="sede-empresa" class="text-[10px] uppercase tracking-widest font-bold text-slate-400"></span>
            </div>
        </div>
        <div id="reloj" class="bg-slate-100 px-5 py-3 rounded-2xl font-black text-slate-700 text-xl">00:00</div>
    </div>

    <div id="barra-alerta" class="max-w-md mx-auto rounded-[2.5rem] p-8 mb-6 card-shadow text-white relative overflow-hidden">
        <span class="text-[10px] font-bold uppercase opacity-80 tracking-wider">Estado del Servicio</span>
        <h2 id="texto-alerta" class="text-xl font-black italic uppercase mt-1 leading-tight tracking-tight">
            Verificando...
        </h2>
    </div>

    <div id="lista-servicios" class="max-w-md mx-auto space-y-3">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const userUID = urlParams.get('id');

        // Reloj en tiempo real
        setInterval(() => {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
        }, 1000);

        if (userUID) {
            onValue(ref(db, 'usuarios/' + userUID), (snapshot) => {
                if (snapshot.exists()) {
                    const d = snapshot.val();
                    const c = d.config?.colores || { primario: "#059669", secundario: "#f0fdf4", acento: "#059669" };

                    document.getElementById('nombre-empresa').innerText = d.config?.nombre || "";
                    document.getElementById('sede-empresa').innerText = d.config?.ubi || "";
                    document.getElementById('texto-alerta').innerText = d.mensaje?.texto || "";
                    
                    // Logo
                    const imgLogo = document.getElementById('logo-img');
                    if(d.config?.logo) { imgLogo.src = d.config.logo; imgLogo.classList.remove('hidden'); }

                    // Colores
                    document.getElementById('barra-alerta').style.backgroundColor = c.acento;
                    document.body.style.backgroundColor = c.secundario;

                    // Lista de Servicios estilo Megabús
                    const lista = document.getElementById('lista-servicios');
                    lista.innerHTML = "";
                    (d.lista?.items || []).forEach(item => {
                        const [nom, est] = item.split(':');
                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-[2rem] flex justify-between items-center card-shadow border border-slate-50";
                        card.innerHTML = `
                            <div class="flex items-center gap-3">
                                <span class="text-2xl">🚌</span>
                                <span class="font-bold text-slate-700 uppercase text-sm">${nom.trim()}</span>
                            </div>
                            <span class="px-4 py-2 rounded-full font-black text-[10px] uppercase" style="background-color:${c.primario}20; color:${c.primario}">
                                ${est ? est.trim() : '---'}
                            </span>
                        `;
                        lista.appendChild(card);
                    });
                }
            });
        }
    </script>
</body>
</html>
