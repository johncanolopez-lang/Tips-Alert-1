<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Alert - Visualizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
        }
        /* Transición suave para los cambios de color */
        body, h1, div { transition: all 0.5s ease; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans overflow-hidden">

    <div class="bg-white shadow-lg p-6">
        <div class="overflow-hidden">
            <h1 id="nombre-empresa" class="text-6xl font-black italic uppercase tracking-tighter animate-marquee">
                Cargando información...
            </h1>
        </div>
        <p id="sede-empresa" class="text-center font-bold text-slate-400 uppercase tracking-widest mt-2"></p>
    </div>

    <div id="barra-alerta" class="p-4 text-center">
        <p id="texto-alerta" class="font-black italic uppercase text-2xl tracking-tight"></p>
    </div>

    <div class="p-6 max-w-4xl mx-auto">
        <div id="lista-servicios" class="grid grid-cols-1 gap-4">
            <p class="text-center text-slate-400">Conectando con el servidor...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2ryALUu7CxU0t2sH61Q2oXg5IlX2Eupw",
            authDomain: "tips-alert.firebaseapp.com",
            projectId: "tips-alert",
            databaseURL: "https://tips-alert-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. OBTENER EL ID DESDE EL QR (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const userUID = urlParams.get('id');

        if (userUID) {
            const userRef = ref(db, 'usuarios/' + userUID);
            
            // 2. ESCUCHAR CAMBIOS EN TIEMPO REAL
            onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const d = snapshot.val();
                    
                    // --- APLICAR TEXTOS ---
                    document.getElementById('nombre-empresa').innerText = d.config?.nombre || "Tips Alert";
                    document.getElementById('sede-empresa').innerText = d.config?.ubi || "";
                    document.getElementById('texto-alerta').innerText = d.mensaje?.texto || "SIN NOVEDAD";

                    // --- REGLA 60-30-10 DE COLORES ---
                    const cp = d.config?.colores?.primario || "#000000"; // 60% (Nombre)
                    const cs = d.config?.colores?.secundario || "#ffffff"; // 30% (Fondo suave)
                    const ca = d.config?.colores?.acento || "#ef4444"; // 10% (Alertas)

                    // Color Primario al nombre
                    document.getElementById('nombre-empresa').style.color = cp;
                    
                    // Color Secundario al fondo de la página (con 10% de opacidad)
                    document.body.style.backgroundColor = cs + "1A"; 

                    // Color de Acento a la barra de alerta
                    const barra = document.getElementById('barra-alerta');
                    barra.style.backgroundColor = ca;
                    barra.style.color = "#ffffff"; // Texto de alerta siempre blanco para leer bien

                    // --- CARGAR SERVICIOS ---
                    const listaDiv = document.getElementById('lista-servicios');
                    listaDiv.innerHTML = "";
                    
                    if (d.lista?.items) {
                        d.lista.items.forEach(item => {
                            const partes = item.split(':');
                            const nombre = partes[0] || "";
                            const estado = partes[1] || "";
                            
                            const card = document.createElement('div');
                            card.className = "bg-white p-6 rounded-[2rem] shadow-sm flex justify-between items-center border-l-8";
                            card.style.borderLeftColor = cp; // Borde del color primario
                            
                            card.innerHTML = `
                                <span class="font-bold uppercase text-xl">${nombre}</span>
                                <span class="font-black italic uppercase text-indigo-600">${estado}</span>
                            `;
                            listaDiv.appendChild(card);
                        });
                    }
                } else {
                    document.getElementById('nombre-empresa').innerText = "Usuario no encontrado";
                }
            });
        } else {
            document.getElementById('nombre-empresa').innerText = "QR Inválido o sin ID";
        }
    </script>
</body>
</html>lores.secundario + "10"; // 10 añade transparencia
